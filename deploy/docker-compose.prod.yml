# Linux 生产参考编排（镜像由 deploy/Dockerfile 构建）
#   docker compose -f deploy/docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: game
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-game}
      POSTGRES_DB: game
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game -d game"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrate:
    image: migrate/migrate
    volumes:
      - ../migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://game:${POSTGRES_PASSWORD:-game}@postgres:5432/game?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  platform-api:
    image: game-platform-api:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: platform-api
    environment:
      DATABASE_URL: postgres://game:${POSTGRES_PASSWORD:-game}@postgres:5432/game?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      HMAC_SECRET: ${HMAC_SECRET}
      APP_ID: ${APP_ID:-cocos-dev}
      PLATFORM_HTTP_PORT: "8080"
      PITAYA_WS_URL: ${PITAYA_WS_URL:-ws://localhost:3250}
      GIN_MODE: release
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "${PLATFORM_HTTP_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  game:
    image: game-server:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: game
    environment:
      DATABASE_URL: postgres://game:${POSTGRES_PASSWORD:-game}@postgres:5432/game?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      HMAC_SECRET: ${HMAC_SECRET}
      PITAYA_WS_PORT: "3250"
      GIN_MODE: release
    ports:
      - "${PITAYA_WS_PORT:-3250}:3250"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
