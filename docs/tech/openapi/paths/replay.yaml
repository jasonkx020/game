/v1/rounds/{round_id}/events:
  get:
    tags:
      - Replay
    summary: 分页查询局内事件（运营/调试）
    operationId: listRoundEvents
    security:
      - bearerAuth: []
        signatureAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/XAppId'
      - $ref: '../components/parameters.yaml#/XTimestamp'
      - $ref: '../components/parameters.yaml#/XNonce'
      - $ref: '../components/parameters.yaml#/XContentSha256'
      - $ref: '../components/parameters.yaml#/XSignature'
      - name: round_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: since_seq
        in: query
        description: 返回 action_seq 大于该值的事件
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ActionLogPageResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/v1/admin/audit/actions:
  get:
    tags:
      - Audit
    summary: 按 audit_sn 或 room_id 查询动作日志（P3 运营后台）
    operationId: queryAuditActions
    security:
      - bearerAuth: []
        signatureAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/XAppId'
      - $ref: '../components/parameters.yaml#/XTimestamp'
      - $ref: '../components/parameters.yaml#/XNonce'
      - $ref: '../components/parameters.yaml#/XContentSha256'
      - $ref: '../components/parameters.yaml#/XSignature'
      - name: audit_sn
        in: query
        schema:
          type: integer
          format: int64
      - name: room_id
        in: query
        schema:
          type: string
          format: uuid
      - name: round_id
        in: query
        schema:
          type: string
          format: uuid
      - name: context_size
        in: query
        description: 前后各返回 N 条上下文
        schema:
          type: integer
          minimum: 0
          maximum: 20
          default: 5
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/AuditActionQueryResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
