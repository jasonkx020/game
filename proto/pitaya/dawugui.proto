syntax = "proto3";

package pitaya.dawugui;

import "pitaya/common.proto";

option go_package = "github.com/example/game/gen/pitaya/dawugui;dawugui";

message PlayCardsReq {
  string room_id = 1;
  repeated uint32 cards = 2;
}

message PlayCardsRsp {
  pitaya.common.EventMeta meta = 1;  // 首条 event 的 meta，便于 C2S 关联
}

message PassReq {
  string room_id = 1;
}

message PassRsp {
  pitaya.common.EventMeta meta = 1;
}

message DealPush {
  pitaya.common.PushHeader header = 1;
  string round_id = 2;
  repeated uint32 hand_cards = 3;
  uint32 first_seat = 4;
  uint32 dealer_seat = 5;
}

message TurnNotifyPush {
  pitaya.common.PushHeader header = 1;
  uint32 current_seat = 2;
  uint32 timeout_ms = 3;
  bool must_play = 4;
  uint32 last_play_seat = 5;
}

message PlayResultPush {
  pitaya.common.PushHeader header = 1;
  uint32 seat = 2;
  repeated uint32 cards = 3;
  uint32 play_type = 4;  // 1=play 2=pass
  uint32 next_seat = 5;
}

message AlertPush {
  pitaya.common.PushHeader header = 1;
  uint64 user_id = 2;
  uint32 seat = 3;
  uint32 hand_count = 4;
}

message RoundInvalidPush {
  pitaya.common.PushHeader header = 1;
  uint32 reason_code = 2;
  string message = 3;
}

message PlayerScore {
  uint64 user_id = 1;
  uint32 seat = 2;
  int32 rule_score = 3;
}

message PlayerCoin {
  uint64 user_id = 1;
  int64 delta = 2;
  uint64 audit_sn = 3;
}

message SettlementPush {
  pitaya.common.PushHeader header = 1;
  string round_id = 2;
  bool is_valid = 3;
  uint64 winner_id = 4;
  repeated PlayerScore scores = 5;
  optional PlayerScore liability = 6;
  repeated PlayerCoin coin_delta = 7;
  int64 rake_amount = 8;
}
